dimension: 6
n_values: [2, 3, 4, 5, 6, 7]
seeds: [1234]
dtype: complex128
backend: cpu
matrix_exp_backend: torch_native
optimizer: adam
learning_rate: 0.02
initialization_scale: 0.05
steps:
